<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No-Scroll Shopping List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f9fafb; 
            color: #111827;
            overflow-x: hidden; /* Prevent horizontal swipe */
        }

        /* Essential for Text Wrapping */
        textarea {
            resize: none;
            overflow: hidden;
            min-height: 40px;
            line-height: 1.4;
            width: 100%;
            background: transparent;
            border: none;
            font-size: 0.9rem !important;
            padding: 8px 4px !important;
        }

        textarea:focus {
            outline: none;
            border-bottom: 1px solid #e5e7eb;
        }

        .price-input {
            font-size: 0.9rem !important;
            width: 100px;
            text-align: right;
            font-weight: 600;
            background: transparent;
            border: none;
            outline: none;
        }

        #capture-area {
            background: white;
            width: 100%;
            max-width: 100%;
        }

        /* Fixed column ratios to prevent pushing price off screen */
        .col-no { width: 35px; }
        .col-item { width: auto; }
        .col-price { width: 110px; }

        table {
            table-layout: fixed;
            width: 100%;
        }

        .exporting .empty-row {
            display: none !important;
        }

        /* Custom scrollbar for desktop */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-8">

    <div class="max-w-3xl mx-auto">
        
        <!-- The Capture Area -->
        <div id="capture-area" class="shadow-sm border border-slate-200 rounded-xl overflow-hidden">
            
            <!-- Header -->
            <div class="p-6 border-b border-slate-100 flex justify-between items-start">
                <div>
                    <h1 class="text-lg font-bold text-slate-900 tracking-tight">Shopping Registry</h1>
                    <p id="live-date" class="text-[10px] text-slate-400 mt-0.5 uppercase tracking-widest font-bold"></p>
                </div>
                <div class="text-right">
                    <div id="live-time" class="text-lg font-medium text-indigo-600 font-mono"></div>
                    <div class="text-[9px] uppercase tracking-tighter text-slate-300">IST Kolkata</div>
                </div>
            </div>

            <!-- Table -->
            <div class="px-4 pb-6 bg-white">
                <table>
                    <thead>
                        <tr class="text-slate-400 text-[9px] uppercase tracking-[0.15em] font-black border-b border-slate-50">
                            <th class="py-3 col-no text-center">#</th>
                            <th class="py-3 px-2 col-item text-left">Item Details</th>
                            <th class="py-3 col-price text-right">Price (₹)</th>
                        </tr>
                    </thead>
                    <tbody id="list-body">
                        <!-- Dynamic Rows -->
                    </tbody>
                </table>

                <!-- Summary Area -->
                <div class="mt-6 pt-6 border-t border-slate-100 flex justify-between items-center px-2">
                    <div class="text-[9px] font-bold uppercase tracking-widest text-slate-300">Net Total</div>
                    <div class="text-right">
                        <span class="text-2xl font-bold text-slate-900">₹<span id="grand-total">0.00</span></span>
                    </div>
                </div>
            </div>

            <!-- Footer Timestamp -->
            <div class="bg-slate-50 px-6 py-3 text-[8px] text-slate-400 font-bold uppercase tracking-[0.2em] flex justify-between border-t border-slate-100">
                <span id="footer-timestamp"></span>
                <span>Automated Log</span>
            </div>
        </div>

        <!-- Utility Controls -->
        <div class="mt-6 flex items-center justify-between px-2">
            <button onclick="downloadAsImage()" class="px-6 py-3 bg-slate-900 text-white rounded-lg text-[10px] font-bold uppercase tracking-widest hover:bg-indigo-600 transition-all shadow-md flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Save Image
            </button>
            <button onclick="resetList()" class="text-[9px] font-bold uppercase tracking-widest text-slate-300 hover:text-red-500 transition-colors">
                Clear
            </button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest opacity-0 transition-opacity duration-300 shadow-xl pointer-events-none">
        Saved to Device
    </div>

    <script>
        const listBody = document.getElementById('list-body');
        const grandTotalDisplay = document.getElementById('grand-total');
        let rowCount = 0;

        function updateClock() {
            const now = new Date();
            const dateOpt = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', timeZone: 'Asia/Kolkata' };
            const timeOpt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true, timeZone: 'Asia/Kolkata' };
            
            document.getElementById('live-date').textContent = now.toLocaleDateString('en-IN', dateOpt);
            document.getElementById('live-time').textContent = now.toLocaleTimeString('en-IN', timeOpt);
            document.getElementById('footer-timestamp').textContent = now.toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function createNewRow() {
            rowCount++;
            const row = document.createElement('tr');
            row.className = "empty-row border-b border-slate-50"; 
            row.id = `row-${rowCount}`;
            
            row.innerHTML = `
                <td class="col-no text-center text-slate-300 font-mono text-[10px] py-2">${rowCount}</td>
                <td class="px-2 col-item py-2">
                    <textarea id="name-${rowCount}" 
                              rows="1"
                              oninput="handleTextarea(this, ${rowCount})"
                              placeholder="Describe item..."></textarea>
                </td>
                <td class="col-price text-right py-2">
                    <input type="number" 
                           step="0.01" 
                           placeholder="0.00" 
                           oninput="handlePriceInput(this, ${rowCount})" 
                           class="price-input">
                </td>
            `;
            listBody.appendChild(row);
        }

        function handleTextarea(el, id) {
            // Auto-expand height
            el.style.height = "auto";
            el.style.height = (el.scrollHeight) + "px";

            const val = el.value.toLowerCase();
            if (val === "c ") el.value = "Chicken ";
            if (val === "m ") el.value = "Mutton ";
        }

        function handlePriceInput(input, id) {
            const row = document.getElementById(`row-${id}`);
            if (input.value !== "") row.classList.remove('empty-row');
            else row.classList.add('empty-row');

            calculateTotal();
            
            const rows = listBody.querySelectorAll('tr');
            const lastRowId = parseInt(rows[rows.length - 1].id.split('-')[1]);
            if (id === lastRowId && input.value !== "") createNewRow();
        }

        function calculateTotal() {
            const priceInputs = document.querySelectorAll('.price-input');
            let total = 0;
            priceInputs.forEach(input => {
                const val = parseFloat(input.value);
                if (!isNaN(val)) total += val;
            });
            grandTotalDisplay.textContent = total.toLocaleString('en-IN', { minimumFractionDigits: 2 });
        }

        function downloadAsImage() {
            const area = document.getElementById('capture-area');
            const toast = document.getElementById('toast');
            area.classList.add('exporting');
            
            html2canvas(area, { 
                scale: 3,
                useCORS: true,
                backgroundColor: "#ffffff"
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Registry_${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                area.classList.remove('exporting');
                toast.style.opacity = "1";
                setTimeout(() => toast.style.opacity = "0", 2000);
            });
        }

        function resetList() {
            if(confirm("Clear current list?")) {
                listBody.innerHTML = ""; rowCount = 0; createNewRow(); calculateTotal();
            }
        }

        window.onload = createNewRow;
    </script>
</body>
</html>
