<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro List Tracker (IST)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #f8fafc; 
        }

        /* Large, readable inputs */
        input, select {
            font-size: 1.15rem !important;
            padding: 12px !important;
        }

        .row-animation {
            transition: all 0.3s ease;
        }

        #capture-area {
            background: white;
            border-radius: 24px;
        }

        /* Ensure Sl. No is included and visible in export */
        .sl-no-cell {
            min-width: 60px;
            text-align: center;
        }

        /* Hide empty buffer row during export */
        .exporting .empty-row {
            display: none !important;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        
        <!-- The Capture Area -->
        <div id="capture-area" class="shadow-2xl border border-slate-200 overflow-hidden">
            
            <!-- Header with Live IST Clock -->
            <div class="bg-indigo-700 p-8 text-white flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">🛒 Pro Shopping List</h1>
                    <p class="text-indigo-100 opacity-90 text-lg">Auto-calculated • IST Time</p>
                </div>
                <div class="text-center md:text-right bg-white/10 p-5 rounded-2xl backdrop-blur-md border border-white/20 min-w-[260px]">
                    <div id="live-date" class="text-xl font-bold"></div>
                    <div id="live-time" class="text-3xl font-mono font-light mt-1"></div>
                    <div class="text-[11px] uppercase tracking-widest font-bold mt-2 opacity-80">IST - Kolkata</div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="p-6 md:p-10 bg-white">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-separate border-spacing-y-4">
                        <thead>
                            <tr class="text-slate-400 text-xs uppercase tracking-[0.2em] font-bold">
                                <th class="pb-2 px-4 sl-no-cell">Sl No.</th>
                                <th class="pb-2 px-4 min-w-[250px]">Item Name</th>
                                <th class="pb-2 px-4 min-w-[150px]">Category</th>
                                <th class="pb-2 px-4 text-right">Price (₹)</th>
                            </tr>
                        </thead>
                        <tbody id="list-body">
                            <!-- Rows -->
                        </tbody>
                    </table>
                </div>

                <!-- Grand Total Footer -->
                <div class="mt-8 pt-8 border-t-2 border-slate-100 flex justify-between items-center">
                    <div class="hidden md:block">
                        <p class="text-slate-400 text-sm italic">Generated instantly via Pro Tracker</p>
                    </div>
                    <div class="text-right">
                        <span class="block text-slate-500 text-sm font-bold uppercase tracking-wider mb-1">Total Amount</span>
                        <div class="flex items-center justify-end gap-2">
                            <span class="text-5xl font-black text-indigo-700">₹ <span id="grand-total">0.00</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Image Footer Timestamp -->
            <div class="bg-slate-50 px-10 py-4 text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest border-t border-slate-100">
                Created on: <span id="footer-timestamp"></span>
            </div>
        </div>

        <!-- App Controls -->
        <div class="mt-8 grid grid-cols-1 md:grid-cols-4 gap-4">
            <button onclick="downloadAsImage()" class="md:col-span-3 bg-indigo-600 hover:bg-indigo-800 text-white text-xl font-bold py-5 rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                Download PNG (Clean)
            </button>
            <button onclick="resetList()" class="bg-white hover:bg-red-50 text-red-500 border-2 border-red-100 py-5 rounded-2xl font-bold transition-colors">
                Reset
            </button>
        </div>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-10 py-4 rounded-full shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none font-bold">
        📸 Image Saved Successfully!
    </div>

    <script>
        const listBody = document.getElementById('list-body');
        const grandTotalDisplay = document.getElementById('grand-total');
        const categories = ["Select", "Vegetables", "Fish", "Fruits", "Chicken", "Mutton", "Other"];
        let rowCount = 0;

        // --- Live Clock ---
        function updateClock() {
            const now = new Date();
            const dateOpt = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Kolkata' };
            const timeOpt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true, timeZone: 'Asia/Kolkata' };
            
            const d = now.toLocaleDateString('en-IN', dateOpt);
            const t = now.toLocaleTimeString('en-IN', timeOpt);
            
            document.getElementById('live-date').textContent = d;
            document.getElementById('live-time').textContent = t;
            document.getElementById('footer-timestamp').textContent = `${d} | ${t}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- Row Logic ---
        function createNewRow() {
            rowCount++;
            const row = document.createElement('tr');
            row.className = "row-animation empty-row"; 
            row.id = `row-${rowCount}`;
            
            row.innerHTML = `
                <td class="py-3 px-4 bg-slate-50/80 rounded-l-2xl text-slate-500 font-black text-center border-y border-l border-slate-100 sl-no-cell">${rowCount}</td>
                <td class="py-3 px-4 bg-slate-50/80 border-y border-slate-100">
                    <input type="text" id="name-${rowCount}" placeholder="Item name..." class="item-input w-full bg-transparent border-b-2 border-slate-200 focus:border-indigo-500 py-2 transition-all font-semibold text-slate-800 outline-none">
                </td>
                <td class="py-3 px-4 bg-slate-50/80 border-y border-slate-100">
                    <select onchange="handleCategoryChange(this, ${rowCount})" class="w-full bg-white border border-slate-200 rounded-xl py-2 px-3 text-slate-600 font-medium focus:ring-2 focus:ring-indigo-200 outline-none cursor-pointer">
                        ${categories.map(cat => `<option value="${cat.toLowerCase()}">${cat}</option>`).join('')}
                    </select>
                </td>
                <td class="py-3 px-4 bg-slate-50/80 rounded-r-2xl text-right border-y border-r border-slate-100">
                    <input type="number" step="0.01" placeholder="0.00" oninput="handlePriceInput(this, ${rowCount})" class="price-input w-36 text-right font-bold text-indigo-700 bg-white border-2 border-slate-100 rounded-xl py-2 px-3 focus:border-indigo-500 focus:bg-indigo-50 outline-none transition-all">
                </td>
            `;
            listBody.appendChild(row);
        }

        function handleCategoryChange(select, id) {
            const nameInput = document.getElementById(`name-${id}`);
            const val = select.value;
            
            // Auto-fill logic
            if (val === "chicken") {
                nameInput.value = "Chicken";
            } else if (val === "mutton") {
                nameInput.value = "Mutton";
            }
        }

        function handlePriceInput(input, id) {
            const row = document.getElementById(`row-${id}`);
            if (input.value !== "") {
                row.classList.remove('empty-row');
            } else {
                row.classList.add('empty-row');
            }

            calculateTotal();
            
            const rows = listBody.querySelectorAll('tr');
            const lastRowId = parseInt(rows[rows.length - 1].id.split('-')[1]);
            if (id === lastRowId && input.value !== "") {
                createNewRow();
            }
        }

        function calculateTotal() {
            const priceInputs = document.querySelectorAll('.price-input');
            let total = 0;
            priceInputs.forEach(input => {
                const val = parseFloat(input.value);
                if (!isNaN(val)) total += val;
            });
            grandTotalDisplay.textContent = total.toLocaleString('en-IN', { minimumFractionDigits: 2 });
        }

        function downloadAsImage() {
            const area = document.getElementById('capture-area');
            const toast = document.getElementById('toast');
            
            area.classList.add('exporting');
            document.body.style.cursor = 'wait';

            html2canvas(area, {
                backgroundColor: "#ffffff",
                scale: 3, 
                logging: false,
                useCORS: true,
                onclone: (clonedDoc) => {
                    // Force the sl-no-cell to be visible in clone
                    const slCells = clonedDoc.querySelectorAll('.sl-no-cell');
                    slCells.forEach(cell => cell.style.display = 'table-cell');
                }
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Shopping_List_${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                
                area.classList.remove('exporting');
                document.body.style.cursor = 'default';
                
                toast.style.opacity = "1";
                setTimeout(() => toast.style.opacity = "0", 3000);
            });
        }

        function resetList() {
            if (confirm("Reset everything?")) {
                listBody.innerHTML = "";
                rowCount = 0;
                createNewRow();
                calculateTotal();
            }
        }

        window.onload = createNewRow;
    </script>
</body>
</html>
